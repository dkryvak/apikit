version: "3"

dotenv: [".env"]

vars:
  APP: apikit

tasks:
  gofmt:
    desc: "Check formatting; fails on unformatted files (same as the CI gofmt step)"
    cmds:
      - |
        out="$(gofmt -l . | grep -v '^vendor/' || true)"
        if [ -n "$out" ]; then echo "Unformatted files:"; echo "$out"; exit 1; fi

  test:
    desc: "Run unit tests"
    cmds:
      - go test ./...

  tidy:
    desc: "Sync go.mod/go.sum and refresh vendor (run when imports change)"
    cmds:
      - go mod tidy
      - go mod vendor

  hooks:
    desc: "Install git hooks (run once per clone): pre-push runs tidy check + build"
    cmds:
      - git config core.hooksPath .githooks
      - chmod +x .githooks/*

  build:
    desc: "Compile the CLI binary into ./bin (version from git describe, image tag from .env TAG)"
    deps: [gofmt]
    cmds:
      - mkdir -p bin
      - go mod vendor   # refresh vendor before building — same step as ci.yml + GoReleaser
      - |
        VERSION="$(git describe --tags --always --dirty 2>/dev/null || echo dev)"
        LDFLAGS="-s -w"
        LDFLAGS="$LDFLAGS -X apikit/internal/config.version=$VERSION"
        LDFLAGS="$LDFLAGS -X apikit/internal/config.image=ghcr.io/dkryvak/apikit:$TAG"
        LDFLAGS="$LDFLAGS -X apikit/internal/config.podLifetimeSeconds=$POD_LIFETIME_SECONDS"
        LDFLAGS="$LDFLAGS -X apikit/internal/config.jobTTLSeconds=$JOB_TTL_SECONDS"
        LDFLAGS="$LDFLAGS -X apikit/internal/config.podReadyTimeoutSecs=$POD_READY_TIMEOUT_SECONDS"
        CGO_ENABLED=0 go build -trimpath -mod=vendor -ldflags="$LDFLAGS" -o ./bin/{{.APP}} ./cmd/{{.APP}}

  install:
    desc: "Install the built binary into ~/go/bin and set up Zsh completion"
    deps: [build]
    cmds:
      - install -m 0755 ./bin/{{.APP}} "$HOME/go/bin/{{.APP}}"
      - task: completion

  completion:
    desc: "Generate and register Zsh shell autocompletion"
    cmds:
      - mkdir -p ~/.zfunc
      - $HOME/go/bin/{{.APP}} completion zsh > ~/.zfunc/_{{.APP}}
      - echo 'fpath=(~/.zfunc $fpath)' >> ~/.zshrc || true
      - echo 'autoload -Uz compinit && compinit' >> ~/.zshrc || true

  release-check:
    desc: "Validate .goreleaser.yaml (requires goreleaser installed)"
    cmds:
      - goreleaser check

  release-snapshot:
    desc: "Build all release artifacts locally into ./dist without publishing"
    cmds:
      - goreleaser release --snapshot --clean

  clean:
    desc: "Remove build artifacts (bin, dist)"
    cmds:
      - rm -rf bin dist
