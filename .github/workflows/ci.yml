name: CI

# Tag Flow (see docs/release-flow-setup.md):
#   - PRs to main and pushes to main / hotfix/**  → build (the required check)
#   - tag v*                                       → build, then publish the GHCR image
#                                                    AND run GoReleaser (binaries + Release)
# The `docker` job reuses the artifact from `build` (no duplicate build).
# The `release` job (GoReleaser) cross-compiles independently — see .goreleaser.yaml.
on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
      - "hotfix/**"
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so `git describe` works

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: gofmt
        run: |
          out="$(gofmt -l . | grep -v '^vendor/' || true)"
          if [ -n "$out" ]; then echo "Unformatted files:"; echo "$out"; exit 1; fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: Build binary (linux/amd64)
        # Tunables come from repository Variables (Settings → Variables). Unset →
        # the binary's built-in defaults apply. Change them in the UI, then tag —
        # no code or workflow edits needed.
        env:
          POD_LIFETIME_SECONDS: ${{ vars.POD_LIFETIME_SECONDS }}
          JOB_TTL_SECONDS: ${{ vars.JOB_TTL_SECONDS }}
          POD_READY_TIMEOUT_SECONDS: ${{ vars.POD_READY_TIMEOUT_SECONDS }}
        run: |
          if [ "${{ startsWith(github.ref, 'refs/tags/v') }}" = "true" ]; then
            VERSION="${{ github.ref_name }}"
            IMAGE="ghcr.io/${{ github.repository }}:${{ github.ref_name }}"
          else
            VERSION="$(git describe --tags --always --dirty 2>/dev/null || echo dev)"
            IMAGE=""
          fi
          LD="-s -w -X apikit/internal/config.version=$VERSION"
          [ -n "$IMAGE" ] && LD="$LD -X apikit/internal/config.image=$IMAGE"
          [ -n "$POD_LIFETIME_SECONDS" ] && LD="$LD -X apikit/internal/config.podLifetimeSeconds=$POD_LIFETIME_SECONDS"
          [ -n "$JOB_TTL_SECONDS" ] && LD="$LD -X apikit/internal/config.jobTTLSeconds=$JOB_TTL_SECONDS"
          [ -n "$POD_READY_TIMEOUT_SECONDS" ] && LD="$LD -X apikit/internal/config.podReadyTimeoutSecs=$POD_READY_TIMEOUT_SECONDS"
          mkdir -p bin
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="$LD" -o bin/apikit ./cmd/apikit

      - name: Upload binary (release tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: apikit-binary
          path: bin/apikit
          if-no-files-found: error

  docker:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: apikit-binary
          path: bin

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          # Disable the buildx provenance/SBOM attestations: they wrap the image
          # in an OCI index and leave untagged manifest entries in the GHCR
          # package. A single-platform image with attestations off pushes a
          # clean, fully-tagged manifest.
          provenance: false
          sbom: false
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest

  # Cross-platform binaries + GitHub Release (binaries, checksums, changelog).
  # Independent of `build` — GoReleaser does its own cross-compilation.
  # Config: .goreleaser.yaml. Runs only on v* tags.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release and upload assets
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags for the changelog and git describe

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Same tunables as the build job; unset → binary defaults apply.
          POD_LIFETIME_SECONDS: ${{ vars.POD_LIFETIME_SECONDS }}
          JOB_TTL_SECONDS: ${{ vars.JOB_TTL_SECONDS }}
          POD_READY_TIMEOUT_SECONDS: ${{ vars.POD_READY_TIMEOUT_SECONDS }}
