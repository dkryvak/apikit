# GoReleaser config — cross-platform binaries + GitHub Release on each v* tag.
# See docs/release-flow-setup.md §5.3. The pod image (GHCR) is still built by the
# `docker` job in ci.yml; GoReleaser handles ONLY the downloadable binaries and
# the GitHub Release (binaries, checksums, changelog).
#
# Local checks (no tag needed):
#   task release-check       # goreleaser check
#   task release-snapshot    # full build into ./dist without publishing
version: 2

project_name: apikit

# Refresh the vendor tree before building. Every build path (the ci.yml `build`
# job, the Taskfile, and this config) runs `go mod vendor` before `go build` so
# the -mod=vendor builds are always consistent with go.mod and never trip on a
# stale vendor/modules.txt. The release runner has network, so this resolves fine.
before:
  hooks:
    - go mod vendor

builds:
  - id: apikit
    main: ./cmd/apikit
    binary: apikit
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # No Windows/arm64 build (per issue scope: windows amd64 only).
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
      - -mod=vendor
    # Same build-time config the Taskfile / ci.yml bake in. POD_* come from the
    # release job env (repo Variables); `index .Env` yields "" when unset, so the
    # binary's built-in defaults apply (matches the ci.yml build job behavior).
    ldflags:
      - -s -w
      - -X apikit/internal/config.version={{ .Tag }}
      - -X apikit/internal/config.image=ghcr.io/dkryvak/apikit:{{ .Tag }}
      - -X apikit/internal/config.podLifetimeSeconds={{ index .Env "POD_LIFETIME_SECONDS" }}
      - -X apikit/internal/config.jobTTLSeconds={{ index .Env "JOB_TTL_SECONDS" }}
      - -X apikit/internal/config.podReadyTimeoutSecs={{ index .Env "POD_READY_TIMEOUT_SECONDS" }}

archives:
  - id: apikit
    ids:
      - apikit
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Performance
      regexp: '^.*?perf(\(.+\))??!?:.+$'
      order: 2
    - title: Others
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - '^build:'
      - '^style:'
      - 'Merge pull request'
      - 'Merge branch'

release:
  github:
    owner: dkryvak
    name: apikit
  draft: false
  prerelease: auto
  name_template: "{{ .Tag }}"
  # Release-notes template. GoReleaser renders: header → grouped changelog
  # (Features / Bug fixes / Performance / Others, see `changelog` above) → footer.
  # Both are Go templates (fields: .Tag, .Version, .ProjectName, .PreviousTag,
  # .Date). The editorial changelog is fully auto-generated from Conventional
  # Commits — only the static wrapper below is maintained by hand. The header is
  # worded to read fine even when the changelog is empty (a release with only
  # docs/chore/ci/build/test/style commits).
  header: |
    ## What's Changed

    `{{ .ProjectName }} {{ .Tag }}` — grouped changes below (if any). Cross-platform
    binaries, `checksums.txt`, and the pod image are attached as assets.
    _Changes since `{{ .PreviousTag }}`._
  footer: |
    ## Install

    **macOS / Linux:**

    ```sh
    curl -fsSL https://raw.githubusercontent.com/dkryvak/apikit/main/install.sh | sh
    ```

    **Windows (PowerShell):**

    ```powershell
    irm https://raw.githubusercontent.com/dkryvak/apikit/main/install.ps1 | iex
    ```

    The installers detect OS/arch, verify the checksum, and set up PATH. To pin a
    version or use a custom install directory, see the
    [README](https://github.com/dkryvak/apikit/blob/main/README.md#install).

    **Docker (in-cluster pod image):**

    ```sh
    docker pull ghcr.io/dkryvak/apikit:{{ .Tag }}
    ```

    ## Verify

    Each archive's SHA-256 is listed in `checksums.txt`. Verify a download with:

    ```sh
    sha256sum --ignore-missing -c checksums.txt
    ```

snapshot:
  version_template: "{{ incpatch .Version }}-next"
